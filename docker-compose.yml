services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kitapantaups}
      POSTGRES_USER: ${POSTGRES_USER:-kitapantaups}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kitapantaups-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db_current.sql:/docker-entrypoint-initdb.d/00-init-db-current.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kitapantaups} -d ${POSTGRES_DB:-kitapantaups}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-kitapantaups}:${POSTGRES_PASSWORD:-kitapantaups-change-me}@db:5432/${POSTGRES_DB:-kitapantaups}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      CORS_ORIGIN: ${PUBLIC_WEB_ORIGIN:-http://localhost:8080}
      BASE_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      UPLOADS_DIR: /app/uploads
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - api_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  api_uploads:
